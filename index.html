<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>방산 동향 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="js/data.js" defer></script>
  <script src="js/charts.js" defer></script>
  <script src="js/api/tavily.js" defer></script>
  <script src="js/news-tavily.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="app">
  <!-- 사이드바: 주요 섹션 네비게이션 -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div>
        <span class="brand-title">DEFENSE</span>
        <span class="brand-sub">동향 대시보드</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="#overview" class="nav-item active" data-section="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        개요
      </a>
      <a href="#spending" class="nav-item" data-section="spending">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        국방 예산
      </a>
      <a href="#regions" class="nav-item" data-section="regions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        지역 동향
      </a>
      <a href="#technology" class="nav-item" data-section="technology">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a4 4 0 0 0-4 4v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2h-2V6a4 4 0 0 0-4-4z"/></svg>
        기술 트렌드
      </a>
      <a href="#news" class="nav-item" data-section="news">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/></svg>
        뉴스 &amp; 이슈
      </a>
    </nav>

    <div class="sidebar-footer">
      <span class="update-badge">실시간 업데이트</span>
      <time id="last-updated" class="update-time"></time>
    </div>
  </aside>

  <main class="main-content">
    <!-- 상단 헤더 -->
    <header class="page-header">
      <div>
        <h1>글로벌 방산 동향</h1>
        <p class="header-desc">2024–2026 국방 예산, 지역별 동향, 기술 혁신을 한눈에</p>
      </div>
      <div class="header-actions">
        <select id="year-filter" class="filter-select" aria-label="연도 선택">
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
        <button type="button" class="btn-refresh" id="btn-refresh" aria-label="데이터 새로고침">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          새로고침
        </button>
      </div>
    </header>

    <!-- KPI 카드 -->
    <section id="overview" class="section">
      <div class="kpi-grid" id="kpi-grid"></div>
    </section>

    <!-- 뉴스·입찰·환율·AI 분석 카드 -->
    <section id="insight-cards" class="section">
      <h2 class="section-title">실시간 인사이트</h2>
      <div class="insight-grid" id="insight-grid"></div>
    </section>

    <!-- 차트 영역 -->
    <section id="spending" class="section">
      <div class="chart-grid">
        <article class="card chart-card">
          <div class="card-header">
            <h2>글로벌 국방비 추이</h2>
            <span class="card-badge">2019–2026</span>
          </div>
          <div class="chart-wrap">
            <canvas id="chart-spending-trend" aria-label="글로벌 국방비 추이 차트"></canvas>
          </div>
        </article>

        <article class="card chart-card">
          <div class="card-header">
            <h2>주요국 국방비 비교</h2>
            <span class="card-badge">2025</span>
          </div>
          <div class="chart-wrap">
            <canvas id="chart-country-compare" aria-label="주요국 국방비 비교 차트"></canvas>
          </div>
        </article>
      </div>

      <div class="chart-grid chart-grid--3">
        <article class="card chart-card">
          <div class="card-header">
            <h2>예산 분야별 구성</h2>
            <span class="card-badge">글로벌</span>
          </div>
          <div class="chart-wrap chart-wrap--sm">
            <canvas id="chart-budget-breakdown" aria-label="예산 분야별 구성 차트"></canvas>
          </div>
        </article>

        <article class="card chart-card">
          <div class="card-header">
            <h2>연간 성장률</h2>
            <span class="card-badge">YoY %</span>
          </div>
          <div class="chart-wrap chart-wrap--sm">
            <canvas id="chart-growth-rate" aria-label="연간 성장률 차트"></canvas>
          </div>
        </article>

        <article class="card chart-card">
          <div class="card-header">
            <h2>수출 상위 품목</h2>
            <span class="card-badge">2024</span>
          </div>
          <div class="chart-wrap chart-wrap--sm">
            <canvas id="chart-export-items" aria-label="수출 상위 품목 차트"></canvas>
          </div>
        </article>
      </div>
    </section>

    <!-- 지역 동향 -->
    <section id="regions" class="section">
      <h2 class="section-title">지역별 방산 동향</h2>
      <div class="region-grid" id="region-grid"></div>
    </section>

    <!-- 기술 트렌드 -->
    <section id="technology" class="section">
      <h2 class="section-title">핵심 기술 트렌드</h2>
      <div class="tech-grid" id="tech-grid"></div>
    </section>

    <!-- 뉴스 & 이슈 -->
    <section id="news" class="section">
      <h2 class="section-title">최신 뉴스 &amp; 이슈</h2>
      <div class="news-list" id="news-list"></div>
    </section>
  </main>
  </div>
</body>
</html>
