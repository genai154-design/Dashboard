<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전국 날씨 — Open-Meteo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles/weather.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/weather.js" defer></script>
</head>
<body>
  <div class="weather-app">
    <!-- 자동 갱신 타이머 — 30초 간격 카운트다운 표시 -->
    <div class="auto-refresh-bar" id="auto-refresh-bar" aria-live="polite">
      <div class="auto-refresh-bar__inner">
        <div class="auto-refresh-bar__label-wrap">
          <span class="auto-refresh-bar__dot" aria-hidden="true"></span>
          <span class="auto-refresh-bar__label">자동 갱신</span>
          <span class="auto-refresh-bar__interval">30초</span>
        </div>
        <div class="auto-refresh-bar__track" aria-hidden="true">
          <div class="auto-refresh-bar__progress" id="refresh-progress"></div>
        </div>
        <div class="auto-refresh-bar__timer-wrap">
          <span class="auto-refresh-bar__timer-label">다음 갱신</span>
          <span id="refresh-timer" class="auto-refresh-bar__timer">30</span>
          <span class="auto-refresh-bar__timer-unit">초</span>
        </div>
      </div>
    </div>

    <header class="weather-header">
      <div class="weather-header__left">
        <a href="index.html" class="back-link" aria-label="대시보드로 돌아가기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          대시보드
        </a>
        <div>
          <h1>전국 날씨</h1>
          <p class="weather-header__desc">Open-Meteo 실시간 기상 데이터</p>
        </div>
      </div>
      <div class="weather-header__actions">
        <time id="update-time" class="update-time"></time>
        <button type="button" class="btn-refresh" id="btn-refresh" aria-label="날씨 새로고침">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          새로고침
        </button>
      </div>
    </header>

    <!-- 로딩 / 오류 상태 -->
    <div id="status-panel" class="status-panel" hidden>
      <div id="loading" class="loading" hidden>
        <div class="loading-spinner" aria-hidden="true"></div>
        <p>전국 날씨 데이터를 불러오는 중…</p>
      </div>
      <div id="error" class="error-panel" hidden>
        <p id="error-message">날씨 정보를 가져오지 못했습니다.</p>
        <button type="button" class="btn-retry" id="btn-retry">다시 시도</button>
      </div>
    </div>

    <!-- 전국 요약 -->
    <section id="summary-section" class="summary-section" hidden>
      <article class="summary-card">
        <span class="summary-label">전국 평균 기온</span>
        <span class="summary-value" id="avg-temp">—</span>
      </article>
      <article class="summary-card summary-card--hot">
        <span class="summary-label">최고 기온</span>
        <span class="summary-value" id="max-temp">—</span>
        <span class="summary-city" id="max-city"></span>
      </article>
      <article class="summary-card summary-card--cold">
        <span class="summary-label">최저 기온</span>
        <span class="summary-value" id="min-temp">—</span>
        <span class="summary-city" id="min-city"></span>
      </article>
      <article class="summary-card">
        <span class="summary-label">관측 지역</span>
        <span class="summary-value" id="city-count">—</span>
      </article>
    </section>

    <!-- Leaflet 전국 날씨 지도 -->
    <section id="map-section" class="map-section" hidden>
      <h2 class="section-heading">전국 날씨 지도</h2>
      <div id="weather-map" class="weather-map" role="application" aria-label="전국 날씨 지도"></div>
    </section>

    <!-- 지역별 날씨 카드 -->
    <section id="weather-section" class="weather-section" hidden>
      <h2 class="section-heading">도시별 날씨</h2>
      <div id="weather-grid" class="weather-grid"></div>
    </section>

    <footer class="weather-footer">
      <p>데이터: <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo</a>
        · 지도: <a href="https://leafletjs.com/" target="_blank" rel="noopener noreferrer">Leaflet</a>
        · <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener noreferrer">OpenStreetMap</a></p>
    </footer>
  </div>
</body>
</html>
